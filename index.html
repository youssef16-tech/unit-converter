<!DOCTYPE html>
<html lang="en" data-theme="dark"
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metric/Imperial Unit Conversion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Drifting gradient orbs + constellation particles -->
    <div class="orbs" aria-hidden="true">
        <span class="orb orb-1"></span>
        <span class="orb orb-2"></span>
        <span class="orb orb-3"></span>
    </div>
    <canvas id="particles" aria-hidden="true"></canvas>
    <canvas id="confetti" aria-hidden="true"></canvas>

    <button id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
    </button>

    <!-- stage provides the 3D perspective for the mouse tilt -->
    <div class="stage">
        <main class="app">
            <header class="hero">
                <h1>Metric/Imperial<br>Unit Conversion</h1>
                <div class="input-wrap">
                    <input id="unit-input" type="number" value="20" step="any" aria-label="Value to convert">
                </div>
                <button id="convert-btn">Convert</button>
            </header>

            <section class="cards">
                <article class="card" style="--delay: 0s">
                    <h2>Length <span>(Meter/Feet)</span></h2>
                    <p class="result" id="length-result"></p>
                </article>
                <article class="card" style="--delay: .12s">
                    <h2>Volume <span>(Liters/Gallons)</span></h2>
                    <p class="result" id="volume-result"></p>
                </article>
                <article class="card" style="--delay: .24s">
                    <h2>Mass <span>(Kilograms/Pounds)</span></h2>
                    <p class="result" id="mass-result"></p>
                </article>
            </section>
        </main>
    </div>

    <script src="index.js"></script>
</body>
</html>
